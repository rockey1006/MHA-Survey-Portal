# Demo/test student seed definitions.
# Used by db/seeds.rb when SEED_DEMO_DATA is enabled (default: non-production).
#
# Fields are intentionally flexible so schema changes are easy to support.
#
# Required:
# - email
# - name
# - track: "Residential" | "Executive"
# - advisor_email: must match a seeded advisor account
#
# Optional:
# - program_year: integer cohort year (e.g., 2026/2027)
# - pending: boolean (default false)
# - multi_semester: boolean (default false)

